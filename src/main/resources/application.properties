# Server Configuration
server.port=${SERVER_PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Vaadin Configuration
vaadin.launch-browser=true

# API Configuration (overridable via environment variables)
openremote.api.endpoint=${OPENREMOTE_API_ENDPOINT:https://fms.pcp.com.gr}
openremote.api.client-id=${OPENREMOTE_API_CLIENT_ID:alamanos-test}
openremote.api.client-secret=${OPENREMOTE_API_CLIENT_SECRET:hw33qKdc9iCfNvcHm6zaDE1v5bJjndVc}

# Refresh Intervals (seconds)
openremote.refresh.realms=${OPENREMOTE_REFRESH_REALMS:60}
openremote.refresh.vehicles=${OPENREMOTE_REFRESH_VEHICLES:60}
openremote.refresh.metrics=${OPENREMOTE_REFRESH_METRICS:1}

# Connection Timeouts (milliseconds)
openremote.connection.timeout=${OPENREMOTE_CONNECTION_TIMEOUT:5000}
openremote.connection.establishment=${OPENREMOTE_CONNECTION_ESTABLISHMENT:2000}

# Retry Configuration
openremote.retry.maxAttempts=${OPENREMOTE_RETRY_MAX_ATTEMPTS:3}
openremote.retry.initialDelay=${OPENREMOTE_RETRY_INITIAL_DELAY:1000}
openremote.retry.maxDelay=${OPENREMOTE_RETRY_MAX_DELAY:30000}

# Multi-Client Simulation
openremote.simulation.defaultClients=${OPENREMOTE_SIMULATION_DEFAULT_CLIENTS:1}
openremote.simulation.maxClients=${OPENREMOTE_SIMULATION_MAX_CLIENTS:100}

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.fms.consumer=INFO
logging.level.root=WARN
